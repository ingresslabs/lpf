apiVersion: v1
kind: ServiceAccount
metadata:
  name: lpf-cni
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lpf-cni
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces", "nodes", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy.ingresslabs.com"]
    resources:
      - "clusterpolicies"
      - "namespacedpolicies"
      - "stagedpolicies"
      - "trafficclasses"
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lpf-cni
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lpf-cni
subjects:
  - kind: ServiceAccount
    name: lpf-cni
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lpf-cni
  namespace: kube-system
  labels:
    app: lpf-cni
    tier: node
spec:
  selector:
    matchLabels:
      app: lpf-cni
  template:
    metadata:
      labels:
        app: lpf-cni
    spec:
      serviceAccountName: lpf-cni
      hostNetwork: true
      hostPID: true
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: lpf-cni
          image: ghcr.io/ingresslabs/lpf-cni:latest
          imagePullPolicy: IfNotPresent
          command: ["/opt/cni/bin/lpf-cni"]
          args: ["daemon"]
          env:
            - name: CNI_PATH
              value: /opt/cni/bin
            - name: LPF_DAEMON_POLICY_PATH
              value: /etc/lpf/policy/policy.lpf
            - name: LPF_DAEMON_KUBE_API_WATCH
              value: "true"
            - name: LPF_DAEMON_CNI_CONFIG_PATH
              value: /etc/lpf/cni/10-lpf.conflist
            - name: LPF_DAEMON_HOST_CNI_BIN_DIR
              value: /host/opt/cni/bin
            - name: LPF_DAEMON_HOST_CNI_NET_DIR
              value: /host/etc/cni/net.d
            - name: LPF_DAEMON_CNI_BINARY_SOURCE
              value: /opt/cni/bin/lpf-cni
            - name: LPF_DAEMON_PORT
              value: "9999"
            - name: LPF_BPF_OBJECT
              value: /opt/lpf/bpf/lpf_kern.o
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF
                - SYS_RESOURCE
          volumeMounts:
            - name: cni-bin
              mountPath: /host/opt/cni/bin
            - name: cni-netd
              mountPath: /host/etc/cni/net.d
            - name: cni-config
              mountPath: /etc/lpf/cni
              readOnly: true
            - name: cluster-policy
              mountPath: /etc/lpf/policy
              readOnly: true
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: lib-modules
              mountPath: /lib/modules
              readOnly: true
            - name: cgroup
              mountPath: /sys/fs/cgroup
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: 9999
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9999
            initialDelaySeconds: 5
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
      volumes:
        - name: cni-bin
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: cni-netd
          hostPath:
            path: /etc/cni/net.d
            type: DirectoryOrCreate
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: cni-config
          configMap:
            name: lpf-cni-config
            items:
              - key: 10-lpf.conflist
                path: 10-lpf.conflist
        - name: cluster-policy
          configMap:
            name: lpf-cluster-policy
            items:
              - key: policy.lpf
                path: policy.lpf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lpf-cni-config
  namespace: kube-system
data:
  10-lpf.conflist: |
    {
      "cniVersion": "1.0.0",
      "name": "lpf",
      "plugins": [
        {
          "type": "lpf-cni",
          "ipam": {
            "type": "host-local",
            "subnet": "10.42.0.0/16",
            "routes": [
              { "dst": "0.0.0.0/0" }
            ]
          },
          "policy": {
            "mode": "auto",
            "defaultAction": "deny",
            "clusterPolicyRef": "lpf-cluster-policy",
            "logDropped": true
          },
          "dns": {}
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: lpf-cluster-policy
  namespace: kube-system
data:
  policy.lpf: |
    # lpf cluster-wide default policy
    set default deny

    # allow DNS
    pass out on eth0 proto udp from any to any port 53 keep state

    # allow kubelet health checks
    pass in on eth0 proto tcp from any to any port {10250,10255}

    # allow node-local traffic
    pass in on eth0 from 10.42.0.0/16 to 10.42.0.0/16
    pass out on eth0 from 10.42.0.0/16 to 10.42.0.0/16 keep state
