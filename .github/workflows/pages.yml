name: Pages

on:
  pull_request:
    paths:
      - 'docs/index.html'
      - 'docs/.nojekyll'
      - '.github/workflows/pages.yml'
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - 'docs/.nojekyll'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate GitHub Pages source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify static landing page
        run: |
          set -euo pipefail
          test -s docs/index.html
          grep -q 'Install from GitHub Releases' docs/index.html
          grep -q 'Next-generation Linux firewall' docs/index.html
