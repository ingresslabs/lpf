name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  ocaml-fast:
    name: OCaml ${{ matrix.ocaml }} fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - ocaml: "5.1.1"
            primary: false
          - ocaml: "5.2.1"
            primary: true
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}

      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest

      - name: Check generated man pages
        if: matrix.primary == true
        run: |
          opam exec -- dune exec -- lpf man generate
          git diff --exit-code -- man/

      - name: Check OCaml formatting
        if: matrix.primary == true
        run: opam exec -- dune build @fmt

      - name: Lint opam metadata
        if: matrix.primary == true
        run: opam lint lpf.opam

      - name: Upload Dune log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dune-log-${{ matrix.ocaml }}
          path: _build/log
          if-no-files-found: ignore

  repo-hygiene:
    name: Generated files and repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: ci/github/repo-hygiene.sh

  coverage:
    name: OCaml coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam install bisect_ppx
      - name: Run instrumented tests
        run: BISECT_ENABLE=yes opam exec -- dune runtest --instrument-with bisect_ppx
      - name: Generate coverage reports
        run: |
          opam exec -- bisect-ppx-report summary --coverage-path _build/default/test > coverage-summary.txt
          opam exec -- bisect-ppx-report cobertura --coverage-path _build/default/test coverage.xml
          opam exec -- bisect-ppx-report html --coverage-path _build/default/test -o _coverage_html/
          cat coverage-summary.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocaml-coverage
          path: |
            coverage.xml
            coverage-summary.txt
            _coverage_html/
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
