name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ocaml:
    name: OCaml ${{ matrix.ocaml }} build and tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ocaml: ["5.1.1", "5.2.1"]
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest

  network-ns:
    name: Network namespace isolation
    runs-on: ubuntu-latest
    needs: ocaml
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: |
          sudo ip netns add lpf-ci
          sudo ip netns exec lpf-ci ip link set lo up
          sudo ip netns exec lpf-ci opam exec -- dune runtest
          sudo ip netns del lpf-ci

  e2e-dry-run:
    name: E2E scenario catalog validation
    runs-on: ubuntu-latest
    needs: ocaml
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam exec -- make e2e-dry-run E2E_SCENARIO_COUNT=100
