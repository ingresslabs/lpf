name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: docker run --rm -v "$PWD:/repo" -w /repo rhysd/actionlint:latest

  ocaml-fast:
    name: OCaml ${{ matrix.ocaml }} fast checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - ocaml: "5.1.1"
            primary: false
          - ocaml: "5.2.1"
            primary: true
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}

      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest

      - name: Check generated man pages
        if: matrix.primary == true
        run: opam exec -- dune exec -- lpf man check

      - name: Lint opam metadata
        if: matrix.primary == true
        run: opam lint lpf.opam

      - name: Upload Dune log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dune-log-${{ matrix.ocaml }}
          path: _build/log
          if-no-files-found: ignore

  repo-hygiene:
    name: Generated files and repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: ci/github/repo-hygiene.sh

  ebpf-compile:
    name: eBPF generated C compile
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - name: Install eBPF toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-generic bpftool file
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - name: Generate and compile eBPF object
        run: |
          set -euo pipefail
          mkdir -p evidence/ebpf
          cat > evidence/ebpf/table-policy.lpf <<'POLICY'
          set default deny
          table <trusted> { 10.0.0.1, 10.0.0.2 }
          pass in proto tcp from <trusted> to any
          POLICY
          opam exec -- dune exec -- lpf ebpf evidence/ebpf/table-policy.lpf > evidence/ebpf/lpf_xdp.c
          grep -q 'BPF_MAP_TYPE_ARRAY' evidence/ebpf/lpf_xdp.c
          grep -q 'BPF_MAP_TYPE_LRU_HASH' evidence/ebpf/lpf_xdp.c
          grep -q 'BPF_MAP_TYPE_RINGBUF' evidence/ebpf/lpf_xdp.c
          grep -q 'bpf_map_lookup_elem' evidence/ebpf/lpf_xdp.c
          grep -q 'SEC("xdp")' evidence/ebpf/lpf_xdp.c
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 -I/usr/include/x86_64-linux-gnu \
            -c evidence/ebpf/lpf_xdp.c -o evidence/ebpf/lpf_xdp.o
          file evidence/ebpf/lpf_xdp.o | tee evidence/ebpf/file.txt
          grep -q 'eBPF' evidence/ebpf/file.txt
          bpftool version | tee evidence/ebpf/bpftool-version.txt
      - name: Upload eBPF evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-compile-evidence
          path: evidence/ebpf
          if-no-files-found: ignore

  e2e-dry-run:
    name: E2E catalog dry-run 1000
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - run: opam exec -- make e2e-dry-run E2E_SCENARIO_COUNT=1000
      - name: Upload dry-run evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-dry-run-evidence
          path: |
            evidence/**
            allure-results/**
          if-no-files-found: ignore

  linux-netns:
    name: Linux root netns smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - name: Install Linux networking tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends nftables iproute2 iputils-ping conntrack
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build
      - name: Run real namespace smoke
        run: |
          sudo _build/default/bin/main.exe e2e run \
            --scenario-count 24 \
            --junit evidence/netns/junit.xml \
            --allure-dir allure-results/netns \
            --evidence-dir evidence/netns \
            --kernel-id github-ubuntu
      - name: Upload namespace evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-netns-evidence
          path: |
            evidence/netns/**
            allure-results/netns/**
          if-no-files-found: ignore

  coverage:
    name: OCaml coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1
      - run: opam install . --deps-only --with-test
      - run: opam install bisect_ppx
      - name: Run instrumented tests
        run: BISECT_ENABLE=yes opam exec -- dune runtest --instrument-with bisect_ppx
      - name: Generate coverage reports
        run: |
          opam exec -- bisect-ppx-report summary > coverage-summary.txt
          opam exec -- bisect-ppx-report lcov > lcov.info
          cat coverage-summary.txt
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocaml-coverage
          path: |
            lcov.info
            coverage-summary.txt
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
