name: eBPF CO-RE E2E

on:
  workflow_dispatch:

jobs:
  ebpf-dataplane:
    name: eBPF CO-RE Compilation and Dataplane Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.2.1

      - name: Install eBPF Toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-headers-generic bpftool file python3

      - name: Build lpf
        run: |
          opam install . --deps-only --with-test
          opam exec -- dune build

      - name: Compile CO-RE Engine
        run: |
          set -euo pipefail
          mkdir -p evidence/ebpf
          cat > evidence/ebpf/table-policy.lpf <<'POLICY'
          set default deny
          table <trusted> { 10.0.0.1, 10.0.0.2 }
          pass in proto tcp from <trusted> to any
          POLICY
          opam exec -- dune exec -- lpf ebpf evidence/ebpf/table-policy.lpf > evidence/ebpf/lpf_engine.c
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 -I/usr/include/x86_64-linux-gnu -c evidence/ebpf/lpf_engine.c -o evidence/ebpf/lpf_engine.o
          file evidence/ebpf/lpf_engine.o
          file evidence/ebpf/lpf_engine.o | grep "eBPF"

      - name: Verify verifier loading via bpftool
        run: |
          # bpftool requires root for bpf() syscalls
          sudo bpftool version
          
          sudo rm -rf /sys/fs/bpf/lpf_tc_xdp
          sudo mkdir -p /sys/fs/bpf/lpf_tc_xdp
          
          # Mount bpffs if not already mounted
          if ! mount | grep -q "/sys/fs/bpf"; then
            sudo mount -t bpf bpf /sys/fs/bpf/
          fi

          sudo bpftool prog loadall evidence/ebpf/lpf_engine.o /sys/fs/bpf/lpf_tc_xdp
          sudo bpftool prog show name lpf_xdp_prog
          sudo bpftool prog show name lpf_tc_prog

      - name: Populate Maps (Dynamic Rule Injection)
        run: |
          # Rule format matching struct lpf_rule:
          # saddr (4), smask (4), daddr (4), dmask (4)
          # sport_low (2), sport_high (2), dport_low (2), dport_high (2)
          # proto (1), action (1), keep_state (1), log (1)
          # xlate_ip (4), xlate_port (2), padding (2)
          # We inject a rule passing outbound TCP (6) to dest port 443 (\x01\xbb) with keep_state=1
          sudo bpftool map update pinned /sys/fs/bpf/lpf_tc_xdp/lpf_egress_rules key hex 00 00 00 00 value hex \
            00 00 00 00  00 00 00 00  00 00 00 00  00 00 00 00 \
            00 00 00 00  bb 01 bb 01  06 00 01 01  00 00 00 00 \
            00 00 00 00  00 00 00 00

      - name: Synthesize Test Packets
        run: |
          python3 -c '
          # Outbound SYN to port 443
          eth = b"\x00\x11\x22\x33\x44\x55\x66\x77\x88\x99\xaa\xbb\x08\x00"
          ip = b"\x45\x00\x00\x28\x00\x01\x00\x00\x40\x06\x00\x00\xc0\xa8\x01\x01\xc0\xa8\x01\x02"
          tcp = b"\x12\x34\x01\xbb\x00\x00\x00\x00\x00\x00\x00\x00\x50\x02\x20\x00\x00\x00\x00\x00"
          with open("evidence/ebpf/packet.bin", "wb") as f:
              f.write(eth + ip + tcp)

          # Inbound SYN-ACK from port 443
          eth_ret = b"\x66\x77\x88\x99\xaa\xbb\x00\x11\x22\x33\x44\x55\x08\x00"
          ip_ret = b"\x45\x00\x00\x28\x00\x01\x00\x00\x40\x06\x00\x00\xc0\xa8\x01\x02\xc0\xa8\x01\x01"
          tcp_ret = b"\x01\xbb\x12\x34\x00\x00\x00\x00\x00\x00\x00\x00\x50\x12\x20\x00\x00\x00\x00\x00"
          with open("evidence/ebpf/packet_return.bin", "wb") as f:
              f.write(eth_ret + ip_ret + tcp_ret)
          '

      - name: Test XDP Dataplane WITHOUT State
        run: |
          # Engine default action is DROP (1) for XDP.
          sudo bpftool prog run pinned /sys/fs/bpf/lpf_tc_xdp/lpf_xdp_prog data_in evidence/ebpf/packet_return.bin data_out /dev/null > evidence/ebpf/xdp_out_1.txt
          cat evidence/ebpf/xdp_out_1.txt
          grep -q "Return value: 1" evidence/ebpf/xdp_out_1.txt

      - name: Test TC Dataplane (Populate State)
        run: |
          # Dynamic rule passes OUT to port 443 keep state -> returns TC_ACT_OK (0)
          sudo bpftool prog run pinned /sys/fs/bpf/lpf_tc_xdp/lpf_tc_prog data_in evidence/ebpf/packet.bin data_out /dev/null > evidence/ebpf/tc_out.txt
          cat evidence/ebpf/tc_out.txt
          grep -q "Return value: 0" evidence/ebpf/tc_out.txt

      - name: Test XDP Dataplane WITH State
        run: |
          # Return packet should now return XDP_PASS (2) due to LRU Conntrack hash lookup!
          sudo bpftool prog run pinned /sys/fs/bpf/lpf_tc_xdp/lpf_xdp_prog data_in evidence/ebpf/packet_return.bin data_out /dev/null > evidence/ebpf/xdp_out_2.txt
          cat evidence/ebpf/xdp_out_2.txt
          grep -q "Return value: 2" evidence/ebpf/xdp_out_2.txt

      - name: Teardown
        if: always()
        run: |
          sudo rm -rf /sys/fs/bpf/lpf_tc_xdp
