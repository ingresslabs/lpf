version: v1.0
name: lpf

agent:
  machine:
    type: s1-localhost

auto_cancel:
  running:
    when: "branch != 'main' AND branch != 'master'"

global_job_config:
  env_vars:
    - name: LPF_OCAML_COMPILER
      value: "5.2.1"
    - name: LPF_OPAM_SWITCH
      value: lpf-ci-5.2.1
  prologue:
    commands:
      - checkout
  epilogue:
    always:
      commands:
        - 'for f in junit-*.xml; do [ -f "$f" ] || continue; n="${f#junit-}"; n="${n%.xml}"; test-results publish "$f" --name "$n"; done'
        - 'if [ -d reports ]; then artifact push workflow reports --destination "reports/${SEMAPHORE_JOB_NAME:-job}" --force; fi'

blocks:
  - name: Build and unit tests
    dependencies: []
    task:
      jobs:
        - name: dune-runtest
          commands:
            - ci/semaphore/setup-ocaml.sh
            - eval "$(opam env --switch="$LPF_OPAM_SWITCH" --set-switch)"
            - dune build
            - dune runtest
            - dune exec -- lpf man check --dir man/generated
            - dune build @fmt
            - opam lint lpf.opam

  - name: QEMU functional suite
    dependencies:
      - Build and unit tests
    task:
      jobs:
        - name: qemu-30-step-suite
          execution_time_limit:
            minutes: 45
          commands:
            - ci/semaphore/setup-ocaml.sh
            - eval "$(opam env --switch="$LPF_OPAM_SWITCH" --set-switch)"
            - dune build
            - ci/semaphore/functional-suite.sh

after_pipeline:
  task:
    jobs:
      - name: Pipeline test report
        commands:
          - test-results gen-pipeline-report
